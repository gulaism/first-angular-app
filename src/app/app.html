<app-header />

<main>
  <ul id="users">
    @for(user of users; track user.id) {
    <li>
      <app-user [selected]="user.id === currentUser?.id" (select)="onSelectUser($event)" [user]="user" />
    </li>
    }
  </ul>

  @if(currentUser) {
  <app-tasks [userId]="currentUser.id" [user]="currentUser" />
  } @else {
  <p>So as to see the tasks, please select a user.</p>
  }
</main>
